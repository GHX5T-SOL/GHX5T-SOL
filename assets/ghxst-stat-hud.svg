<svg xmlns="http://www.w3.org/2000/svg" width="900" height="230" viewBox="0 0 900 230" role="img" aria-labelledby="title desc">
  <title id="title">Ghxst stat HUD</title>
  <desc id="desc">Decorative neon HUD for profile statistics.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop stop-color="#7dd3fc"/>
      <stop offset=".52" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .dash { stroke-dasharray: 10 14; animation: dash 9s linear infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -240; } }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect width="900" height="230" rx="22" fill="#05070d"/>
  <rect x="14" y="14" width="872" height="202" rx="18" fill="none" stroke="url(#g)" stroke-width="2"/>
  <g opacity=".14" stroke="#7dd3fc"><path d="M0 58H900M0 116H900M0 174H900M150 0V230M300 0V230M450 0V230M600 0V230M750 0V230"/></g>
  <path class="dash" d="M38 156C140 72 230 188 332 102S526 28 636 104S756 182 862 70" fill="none" stroke="url(#g)" stroke-width="4" filter="url(#glow)"/>
  <g class="mono" text-anchor="middle">
    <text x="450" y="48" fill="#e5e7eb" font-size="18">Ghxst / public metrics</text>
    <text x="150" y="197" fill="#7dd3fc" font-size="13">views</text>
    <text x="300" y="197" fill="#cbd5e1" font-size="13">followers</text>
    <text x="450" y="197" fill="#f472b6" font-size="13">languages</text>
    <text x="600" y="197" fill="#cbd5e1" font-size="13">activity</text>
    <text x="750" y="197" fill="#7dd3fc" font-size="13">trophies</text>
  </g>
  <g class="pulse" filter="url(#glow)">
    <circle cx="150" cy="136" r="9" fill="#7dd3fc"/>
    <circle cx="300" cy="124" r="9" fill="#e5e7eb"/>
    <circle cx="450" cy="82" r="9" fill="#f472b6"/>
    <circle cx="600" cy="88" r="9" fill="#e5e7eb"/>
    <circle cx="750" cy="128" r="9" fill="#7dd3fc"/>
  </g>
</svg>
