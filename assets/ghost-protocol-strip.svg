<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="180" viewBox="0 0 1200 180" role="img" aria-labelledby="title desc">
  <title id="title">Ghost protocol strip</title>
  <desc id="desc">Animated cyberpunk protocol strip with skull glyphs, flame pulses, and proof-first command flow.</desc>
  <defs>
    <linearGradient id="line" x1="0" x2="1">
      <stop stop-color="#00e5ff"/>
      <stop offset=".5" stop-color="#ff2bd6"/>
      <stop offset="1" stop-color="#a3ff12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .dash { stroke-dasharray: 16 18; animation: dash 8s linear infinite; }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .pulse2 { animation: pulse 2s ease-in-out infinite .7s; }
      @keyframes dash { to { stroke-dashoffset: -272; } }
      @keyframes pulse { 0%, 100% { transform: translateY(0); opacity: .55; } 50% { transform: translateY(-10px); opacity: 1; } }
    </style>
  </defs>
  <rect width="1200" height="180" rx="18" fill="#030712"/>
  <path class="dash" d="M24 90 H1176" stroke="url(#line)" stroke-width="4" filter="url(#glow)"/>
  <g class="mono" text-anchor="middle" font-size="16" fill="#d9fbff">
    <text x="120" y="52">SCOPE</text>
    <text x="320" y="52">READ</text>
    <text x="520" y="52">REPRO</text>
    <text x="720" y="52">PATCH</text>
    <text x="920" y="52">PROVE</text>
    <text x="1080" y="52">SHIP</text>
  </g>
  <g filter="url(#glow)">
    <g class="pulse">
      <circle cx="120" cy="90" r="24" fill="#00e5ff"/><text x="120" y="98" text-anchor="middle" font-size="28">👁</text>
      <circle cx="520" cy="90" r="24" fill="#ff2bd6"/><text x="520" y="99" text-anchor="middle" font-size="28">☠</text>
      <circle cx="920" cy="90" r="24" fill="#a3ff12"/><text x="920" y="99" text-anchor="middle" font-size="28">🔥</text>
    </g>
    <g class="pulse2">
      <circle cx="320" cy="90" r="20" fill="#111827" stroke="#00e5ff" stroke-width="3"/>
      <circle cx="720" cy="90" r="20" fill="#111827" stroke="#ff2bd6" stroke-width="3"/>
      <circle cx="1080" cy="90" r="20" fill="#111827" stroke="#a3ff12" stroke-width="3"/>
    </g>
  </g>
  <text x="600" y="148" text-anchor="middle" fill="#00e5ff" font-size="15" class="mono">proof-first bounty loop // no keys // no drama // no unscoped fire</text>
</svg>
