<svg xmlns="http://www.w3.org/2000/svg" width="560" height="360" viewBox="0 0 560 360" role="img" aria-labelledby="title desc">
  <title id="title">Animated Satonshi wallet treasure map</title>
  <desc id="desc">A neon treasure-map visualization with a red line, island nodes, wallet vault, and rotating hash rings.</desc>
  <defs>
    <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#030712"/>
      <stop offset=".55" stop-color="#071232"/>
      <stop offset="1" stop-color="#001f2c"/>
    </linearGradient>
    <linearGradient id="route" x1="0" x2="1">
      <stop stop-color="#00e5ff"/>
      <stop offset=".5" stop-color="#ff2bd6"/>
      <stop offset="1" stop-color="#a3ff12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .spin { animation: spin 14s linear infinite; transform-origin: 280px 180px; }
      .pulse { animation: pulse 1.7s ease-in-out infinite; }
      .dash { stroke-dasharray: 9 13; animation: dash 12s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -260; } }
    </style>
  </defs>
  <rect width="560" height="360" rx="24" fill="url(#sea)"/>
  <rect x="12" y="12" width="536" height="336" rx="18" fill="none" stroke="#00e5ff" stroke-opacity=".45"/>
  <g opacity=".18" stroke="#00e5ff">
    <path d="M0 72H560M0 144H560M0 216H560M0 288H560"/>
    <path d="M112 0V360M224 0V360M336 0V360M448 0V360"/>
  </g>
  <path class="dash" d="M38 285 C98 178 166 248 220 160 S318 72 382 150 452 210 512 86" fill="none" stroke="url(#route)" stroke-width="4" filter="url(#glow)"/>
  <path d="M48 52 L512 310" stroke="#ff2bd6" stroke-width="2" opacity=".38"/>
  <text x="32" y="39" fill="#ff2bd6" font-size="14" class="mono">RED_LINE://do_not_cross_without_scope</text>
  <g class="spin" fill="none" stroke="#00e5ff" opacity=".45">
    <circle cx="280" cy="180" r="124"/>
    <circle cx="280" cy="180" r="92"/>
    <path d="M156 180H404M280 56V304"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="82" cy="246" r="11" fill="#00e5ff"/>
    <circle cx="220" cy="160" r="11" fill="#ff2bd6"/>
    <circle cx="382" cy="150" r="11" fill="#a3ff12"/>
    <circle cx="512" cy="86" r="13" fill="#ffffff"/>
  </g>
  <g fill="#d9fbff" font-size="12" class="mono">
    <text x="99" y="250">island_01</text>
    <text x="238" y="164">poneglyph_02</text>
    <text x="248" y="336">grand_line_hash: 000000...D</text>
    <text x="324" y="138">fork_block</text>
  </g>
  <g class="pulse">
    <rect x="396" y="58" width="104" height="56" rx="10" fill="#050814" stroke="#a3ff12" stroke-width="2"/>
    <path d="M428 58 v-12 c0-24 40-24 40 0 v12" fill="none" stroke="#a3ff12" stroke-width="5"/>
    <circle cx="448" cy="87" r="7" fill="#a3ff12"/>
    <text x="448" y="132" text-anchor="middle" fill="#a3ff12" font-size="12" class="mono">SATONSHI_WALLET?</text>
  </g>
  <text x="280" y="324" text-anchor="middle" fill="#00e5ff" font-size="13" class="mono">riddle: not treasure, custody without signature</text>
</svg>
